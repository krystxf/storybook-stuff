name: Visual regression

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited, deleted]

concurrency:
  group: vrt-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write # push diff images to the snapshot branch
  pull-requests: write # upsert the sticky comment
  statuses: write # set the blocking `visual-regression` commit status

jobs:
  visual-regression:
    if: >
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request && github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, 'approve changes'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: krystxf/storybook-vrt@v1
        with:
          build-command: pnpm build-storybook
